/* Service cards */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-lg)}
.svc-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xl);transition:border-color .3s,transform .3s}
.svc-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.svc-card .svc-num{font-size:var(--text-3xl);font-weight:200;color:var(--accent);font-family:'JetBrains Mono','Consolas',monospace;margin-bottom:var(--space-sm);opacity:.4}

.svc-card p{font-size:var(--text-sm);color:var(--text-muted);line-height:1.7;margin:0}

/* Process flow */
.flow-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--space-sm)}
.flow-step{text-align:center;padding:var(--space-md) var(--space-xs);position:relative}
.flow-step::after{content:'';position:absolute;top:24px;right:-6px;width:12px;height:1px;background:var(--accent);opacity:.4}
.flow-step:last-child::after{display:none}
.flow-step .fs-icon{width:48px;height:48px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-sm)}
.flow-step .fs-icon svg{width:20px;height:20px;color:var(--accent)}
.flow-step h4{font-size:var(--text-xs);font-weight:400;color:var(--text-primary);margin:0 0 2px}
.flow-step p{font-size:var(--text-xs);color:var(--text-muted);line-height:1.5;margin:0}

/* Spec list */
.spec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-md);max-width:900px;margin:0 auto}
.spec-item{display:flex;gap:var(--space-md);padding:var(--space-md);background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);align-items:flex-start}
.spec-item svg{flex-shrink:0;width:20px;height:20px;color:var(--accent);margin-top:2px}
.spec-item h4{font-size:var(--text-sm);font-weight:400;color:var(--text-primary);margin:0 0 2px}
.spec-item p{font-size:var(--text-xs);color:var(--text-muted);line-height:1.6;margin:0}

@media(max-width:768px){
  .svc-grid{grid-template-columns:1fr}
  .flow-grid{grid-template-columns:repeat(3,1fr)}
  .flow-step::after{display:none}
  .spec-grid{grid-template-columns:1fr}
}
