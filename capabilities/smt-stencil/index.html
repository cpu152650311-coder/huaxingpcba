<style>
:root{--section-gap:5rem}
.container-wide{max-width:1280px;margin:0 auto;padding:0 var(--space-lg)}

/* Sub-hero */
.sub-hero{position:relative;min-height:55vh;display:flex;align-items:center;overflow:hidden}
.sub-hero-bg{position:absolute;inset:0;z-index:0}
.sub-hero-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.3) saturate(0.5)}
.sub-hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(200,150,62,0.1) 0%,transparent 60%);z-index:1}
.sub-hero-content{position:relative;z-index:2;width:100%;padding:var(--space-3xl) 0}

/* Feature grid */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-lg)}
.feat-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xl);transition:border-color .3s,transform .3s}
.feat-card:hover{border-color:var(--accent-subtle);transform:translateY(-3px)}
.feat-card .fc-icon{width:44px;height:44px;border-radius:var(--radius-md);background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-md)}
.feat-card .fc-icon svg{width:20px;height:20px;color:var(--accent);transition:color .3s,filter .3s}
.feat-card h3{font-size:var(--text-lg);font-weight:400;color:var(--text-primary);margin:0 0 var(--space-sm) 0}
.feat-card p{font-size:var(--text-sm);color:var(--text-muted);line-height:1.7;margin:0}

/* Spec table */
.spec-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
.spec-table thead th{text-align:left;padding:var(--space-md);color:var(--accent);font-weight:300;text-transform:uppercase;letter-spacing:.08em;font-size:var(--text-xs);border-bottom:1px solid var(--border)}
.spec-table tbody td{padding:var(--space-md);color:var(--text-secondary);border-bottom:1px solid rgba(255,255,255,.04)}
.spec-table tbody tr:hover{background:rgba(200,150,62,.03)}
.spec-table .param{color:var(--text-primary);font-weight:400;white-space:nowrap}

/* Process timeline */
.process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-md);counter-reset:step}
.process-step{position:relative;text-align:center;padding:var(--space-xl) var(--space-md) var(--space-lg);background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.process-step::before{counter-increment:step;content:counter(step);position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:32px;height:32px;border-radius:50%;background:var(--accent);color:var(--bg-primary);font-size:var(--text-sm);font-weight:600;display:flex;align-items:center;justify-content:center}
.process-step h4{font-size:var(--text-base);font-weight:400;color:var(--text-primary);margin:var(--space-md) 0 var(--space-xs)}
.process-step p{font-size:var(--text-xs);color:var(--text-muted);line-height:1.6;margin:0}

/* Split section */
.split-section{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3xl);align-items:center;padding:var(--space-2xl) 0}
.split-img{position:relative;border-radius:var(--radius-lg);overflow:hidden;aspect-ratio:4/3}
.split-img img{width:100%;height:100%;object-fit:cover}
.split-text h2{font-size:var(--text-3xl);font-weight:200;margin-bottom:var(--space-lg);line-height:1.2}
.split-text h2 em{font-style:normal;color:var(--accent)}
.split-text p{font-size:var(--text-base);color:var(--text-secondary);line-height:1.8;margin-bottom:var(--space-md)}

/* Options cards */
.opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-lg)}
.opt-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-2xl)}
.opt-card.recommended{border-color:var(--accent-25);position:relative}
.opt-card.recommended::after{content:'Most Popular';position:absolute;top:12px;right:16px;font-size:var(--text-xs);color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.opt-card h3{font-size:var(--text-xl);font-weight:300;color:var(--accent);margin:0 0 var(--space-md)}
.opt-card ul{list-style:none;padding:0;margin:0}
.opt-card ul li{font-size:var(--text-sm);color:var(--text-secondary);padding:var(--space-xs) 0;padding-left:var(--space-lg);position:relative;line-height:1.7}
.opt-card ul li::before{content:'';position:absolute;left:0;top:14px;width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.5}

/* CTA */
.cta-section{text-align:center;padding:var(--space-3xl) 0}

@media(max-width:768px){
  .feat-grid{grid-template-columns:1fr}
  .opt-grid{grid-template-columns:1fr}
  .process-grid{grid-template-columns:repeat(2,1fr)}
  .split-section{grid-template-columns:1fr;gap:var(--space-xl)}
  .spec-table{font-size:var(--text-xs)}
  .spec-table thead th,.spec-table tbody td{padding:var(--space-sm)}
}
</style>
