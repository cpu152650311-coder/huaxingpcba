<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Thank You — Huaxing PCBA</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="/design-tokens.css?v=24">
<style>
  body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .thanks-card { text-align: center; max-width: 520px; padding: var(--space-2xl); }
  .thanks-icon { font-size: 3rem; margin-bottom: var(--space-md); }
  .thanks-card h1 { font-weight: 200; font-size: var(--text-3xl); margin-bottom: var(--space-sm); }
  .thanks-card h1 em { font-style: normal; color: var(--accent); }
  .thanks-card p { color: var(--text-secondary); line-height: 1.8; margin-bottom: var(--space-lg); }
  .thanks-card .btn { display: inline-block; }
</style>
</head>
<body>
<div class="thanks-card">
  <div class="thanks-icon">✅</div>
  <h1>Thank <em>You</em></h1>
  <p>Your inquiry has been received. Our team will review your request and respond within <strong>24 hours</strong>.</p>
  <p style="font-size:var(--text-sm);color:var(--text-muted)">Need faster response? Email us directly at <a href="mailto:sales@huaxingpcba.com" style="color:var(--accent)">sales@huaxingpcba.com</a></p>
  <a href="/" class="btn btn-primary">← Back to Home</a>
</div>
</body>
</html>
